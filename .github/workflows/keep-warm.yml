name: Keep Render awake

# Render's free tier puts the backend to sleep after 15 minutes of no traffic,
# and the next request then takes 30-50s to wake it (why the Telegram bot felt
# slow). This workflow pings the health endpoint on a schedule so the server
# never gets a chance to fall asleep.
#
# This repo is public, so GitHub Actions minutes are free and unlimited.
# Note: GitHub's scheduled runs are best-effort and can be delayed a few minutes
# under load, which is why we ping every 5 minutes (well under the 15-min window).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health to keep the server warm
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 120 https://expense-iq-ypan.onrender.com/health || true
